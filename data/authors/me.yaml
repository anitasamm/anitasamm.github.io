      Developed the code for a Bayesian dynamic factor model (B-DFM) in Julia to compute nowcasts for macroeconomic variables, comparing its performance to nowcasts generated using an EM-algorithm. Studied the integration of lead-lag dynamics, dynamic heterogeneity, and stochastic volatility.
