bio: |
  I am a second-year PhD student in Economics at the University of California, San Diego. My research interests are in econometrics and macroeconomics.

  Prior to my PhD, I worked as a Research Analyst in the Monetary Policy Strategy Division at the European Central Bank, where I contributed to analyses prepared for the Governing Council. I am currently co-authoring an ECB working paper studying financial asset price dynamics through structural shocks. I also served as a Research Assistant at Now-Casting Economics, where I developed a Bayesian dynamic factor model with fat tails and lead-lag dynamics for macroeconomic nowcasting.
